services:
  gptlite:
    build: .
    container_name: gptlite
    ports:
      - "3211:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/gptlite.db
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://new-api:3000/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CHAT_API_BASE_URL: ${CHAT_API_BASE_URL:-}
      CHAT_API_KEY: ${CHAT_API_KEY:-}
      IMAGE_API_PROVIDER: ${IMAGE_API_PROVIDER:-openai}
      IMAGE_API_BASE_URL: ${IMAGE_API_BASE_URL:-}
      IMAGE_API_KEY: ${IMAGE_API_KEY:-}
      IMAGE_API_POLL_INTERVAL_MS: ${IMAGE_API_POLL_INTERVAL_MS:-2500}
      IMAGE_API_TIMEOUT_MS: ${IMAGE_API_TIMEOUT_MS:-300000}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-}
      REFERENCE_IMAGE_DIR: /data/reference-images
      REFERENCE_IMAGE_PUBLIC_PATH: ${REFERENCE_IMAGE_PUBLIC_PATH:-/public/reference-images/}
      JWT_SECRET: ${JWT_SECRET}
      DEFAULT_CHAT_MODEL: ${DEFAULT_CHAT_MODEL:-gpt-5.4-mini}
      DEFAULT_THINKING_MODEL: ${DEFAULT_THINKING_MODEL:-gpt-5.4}
      DEFAULT_IMAGE_MODEL: ${DEFAULT_IMAGE_MODEL:-gpt-image-2}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    volumes:
      - ./data:/data
    restart: always
    networks:
      - new-api-network

networks:
  new-api-network:
    external: true
    name: new-api_default
